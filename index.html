  if (r <= 0 || w <= 0) return 0;
  if (r === 1) return w;
  return f === "brzycki" ? Math.round(w * (36 / (37 - r))) : Math.round(w * (1 + r / 30));
};

  const d = Math.floor((Date.now() - new Date(iso).getTime()) / 864e5);

  if (!dates.length) return 0;
  const u = [...new Set(dates.map(d => new Date(d).toDateString()))].sort((a,b) => new Date(b) - new Date(a));
  let s = 0, t = new Date(); t.setHours(0,0,0,0);
  for (let i = 0; i < u.length; i++) {
    const exp = new Date(t); exp.setDate(exp.getDate() - i);
    if (new Date(u[i]).toDateString() === exp.toDateString()) s++;
    else if (i === 0) { const y = new Date(t); y.setDate(y.getDate()-1); if (new Date(u[i]).toDateString()===y.toDateString()) s++; else break; }
    else break;
  }

};

function usePersistedState(key, init) {
  const [state, setState] = useState(() => {
    try { const s = localStorage.getItem("lf_"+key); return s ? JSON.parse(s) : init; } catch { return init; }
  });
  useEffect(() => { try { localStorage.setItem("lf_"+key, JSON.stringify(state)); } catch {} }, [key, state]);
  return [state, setState];
}

// === MODAL ===
function Modal({open, onClose, title, children}) {
  useEffect(() => {
    if (open) document.body.style.overflow="hidden";
    else document.body.style.overflow="";
    return () => { document.body.style.overflow=""; };
  }, [open]);
  if (!open) return null;
  return (
    <div style={{position:"fixed",inset:0,zIndex:80,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(4px)"}} onClick={onClose}/>
      <div style={{position:"relative",zIndex:10,width:"100%",maxWidth:480,maxHeight:"85vh",background:"#12121a",border:"1px solid #2a2a3d",borderRadius:"16px 16px 0 0",display:"flex",flexDirection:"column",overflow:"hidden",animation:"slideUp 0.3s ease-out"}}>
        {title && (
          <div style={{display:"flex",alignItems:"center",justifyContent:"between",padding:"12px 16px",borderBottom:"1px solid #2a2a3d",flexShrink:0}}>
            <span style={{flex:1,fontFamily:"'Oswald',sans-serif",fontSize:18,fontWeight:600,letterSpacing:"0.05em"}}>{title}</span>
            <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",padding:4,color:"#8888a0"}}>
              {Icons.x({size:18})}
            </button>
          </div>
        )}
        <div style={{flex:1,overflowY:"auto",overscrollBehavior:"contain"}}>{children}</div>
      </div>
    </div>
  );
}

// === MINI CHART (SVG-based, no deps) ===
function MiniChart({data, width=300, height=120, color="#00d4ff", filled=true}) {
  if (!data.length) return null;
  const max = Math.max(...data), min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v,i) => {
    const x = (i/(data.length-1)) * width;
    const y = height - ((v-min)/range)*(height-20) - 10;
    return `${x},${y}`;
  });
  const pathD = "M"+pts.join(" L");
  const areaD = pathD + ` L${width},${height} L0,${height} Z`;
  return (
    <svg width="100%" viewBox={`0 0 ${width} ${height}`} style={{display:"block"}}>
      {filled && <path d={areaD} fill={color} fillOpacity={0.1}/>}
      <path d={pathD} fill="none" stroke={color} strokeWidth={2}/>
      {data.map((v,i) => {
        const x = (i/(data.length-1))*width;
        const y = height - ((v-min)/range)*(height-20) - 10;
        return <circle key={i} cx={x} cy={y} r={3} fill={color}/>;
      })}
    </svg>
  );
}

    if (!activeWorkout) {
      const [selGym, setSelGym] = useState(gyms[0]?.id??"");
      const [wName, setWName] = useState("");
      
      const startEmpty = () => setActiveWorkout({gymId:selGym, name:wName||"Workout", exercises:[], startTime:new Date().toISOString()});
      const startTemplate = (t) => {
        const exs = t.exercises.map(te => ({id:uid(), exerciseId:te.exerciseId, sets:Array.from({length:te.sets},()=>({id:uid(),weight:0,reps:0}))}));
        setActiveWorkout({gymId:selGym, name:t.name, exercises:exs, startTime:new Date().toISOString()});
      };

      return (
        <div style={{padding:"16px 16px 96px"}}>
          <h1 style={{fontFamily:S.fontDisplay,fontSize:32,marginBottom:24}}><span style={{color:S.accent}}>START</span> WORKOUT</h1>
          <div style={{marginBottom:16}}>
            <label style={{fontSize:11,color:S.muted,fontFamily:S.fontHeading,letterSpacing:"0.1em",display:"block",marginBottom:4}}>GYM</label>
            <select style={{...S.input,appearance:"auto"}} value={selGym} onChange={e=>setSelGym(e.target.value)}>
              {gyms.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
            </select>
          </div>
          <div style={{marginBottom:24}}>
            <label style={{fontSize:11,color:S.muted,fontFamily:S.fontHeading,letterSpacing:"0.1em",display:"block",marginBottom:4}}>NAME</label>
            <input style={S.input} placeholder="e.g., Heavy Squat Day" value={wName} onChange={e=>setWName(e.target.value)}/>
          </div>
          <button onClick={startEmpty} style={{...S.btn,width:"100%",padding:"14px 16px",fontSize:16,background:S.accent,color:S.bg,marginBottom:24,boxShadow:"0 0 8px rgba(0,212,255,0.4)"}}>
            {Icons.play({size:20,color:S.bg})} START EMPTY WORKOUT
          </button>
          <h2 style={{fontFamily:S.fontHeading,fontSize:16,fontWeight:600,display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            {Icons.copy({size:16,color:S.accent})} Or Start from Template
          </h2>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {templates.map(t=>(
              <button key={t.id} onClick={()=>startTemplate(t)} style={{...S.cardBox,padding:16,border:"none",cursor:"pointer",textAlign:"left",color:S.text,transition:"transform 0.2s"}}
                onMouseDown={e=>e.currentTarget.style.transform="scale(0.98)"} onMouseUp={e=>e.currentTarget.style.transform="scale(1)"}>
                <div style={{fontFamily:S.fontHeading,fontWeight:600,fontSize:14}}>{t.name}</div>
                <div style={{fontSize:11,color:S.muted,marginTop:4}}>{t.exercises.map(e=>exName(e.exerciseId)).join(" · ")}</div>
              </button>
            ))}
          </div>
        </div>
      );
    }

    // Active workout
    const aw = activeWorkout;
    const updateExercises = (exs) => setActiveWorkout({...aw, exercises:exs});
    const addExercise = (exId) => {
      const ne = {id:uid(), exerciseId:exId, sets:[{id:uid(),weight:0,reps:0}]};
      updateExercises([...aw.exercises, ne]);
      setExpandedEx(ne.id);
      setShowPicker(false);
    };
    const addSet = (exId) => updateExercises(aw.exercises.map(e => e.id!==exId ? e : {...e, sets:[...e.sets, {id:uid(), weight:e.sets[e.sets.length-1]?.weight||0, reps:e.sets[e.sets.length-1]?.reps||0}]}));
    const updateSet = (exId, sId, field, val) => updateExercises(aw.exercises.map(e => e.id!==exId ? e : {...e, sets:e.sets.map(s=>s.id!==sId?s:{...s,[field]:val})}));
    const removeSet = (exId, sId) => updateExercises(aw.exercises.map(e => e.id!==exId ? e : {...e, sets:e.sets.filter(s=>s.id!==sId)}));
    const removeEx = (exId) => updateExercises(aw.exercises.filter(e=>e.id!==exId));
    const totalVol = aw.exercises.reduce((s,e)=>s+e.sets.reduce((ss,st)=>ss+st.weight*st.reps,0),0);

    const finishWorkout = () => {
      const dur = Math.round((Date.now()-new Date(aw.startTime).getTime())/60000);
      let prCount = 0;
      aw.exercises.forEach(ex => ex.sets.forEach(s => {
        if (s.weight>0 && s.reps>0) {
          const e1 = calc1RM(s.weight,s.reps,settings.formula);
          const existing = prs.find(p=>p.exerciseId===ex.exerciseId);
          if (!existing || e1 > existing.e1rm) {
            prCount++;
            setPRs(prev => [{exerciseId:ex.exerciseId,weight:s.weight,reps:s.reps,e1rm:e1,date:new Date().toISOString(),gymId:aw.gymId}, ...prev.filter(p=>p.exerciseId!==ex.exerciseId)]);
          }
        }
      }));
      const w = {id:uid(),date:aw.startTime,gymId:aw.gymId,name:aw.name,exercises:aw.exercises,duration:dur,totalVolume:totalVol,prsHit:prCount};
      setWorkouts(prev=>[w,...prev]);
      setGyms(prev=>prev.map(g=>g.id===aw.gymId?{...g,visits:g.visits+1,lastVisit:aw.startTime}:g));
      setFinResult(w);
      setShowFinish(true);
      setActiveWorkout(null);
    };

    return (
      <div style={{padding:"16px 16px 96px"}}>
        {/* Header */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <div style={{flex:1}}>
            <input style={{background:"transparent",border:"none",fontFamily:S.fontHeading,fontSize:20,fontWeight:600,color:S.text,width:"100%",outline:"none",letterSpacing:"0.03em"}} value={aw.name}
              onChange={e=>setActiveWorkout({...aw,name:e.target.value})} placeholder="Workout Name"/>
            <div style={{fontSize:11,color:S.muted,marginTop:2}}>{gyms.find(g=>g.id===aw.gymId)?.name??""} · {fmtVol(totalVol)} vol</div>
          </div>
          <button onClick={()=>{if(confirm("Cancel this workout?"))setActiveWorkout(null)}} style={{...S.btn,background:"transparent",color:S.red,padding:8}}>{Icons.x({size:18,color:S.red})}</button>
        </div>

        {/* Exercises */}
        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:16}}>
          {aw.exercises.map((ex,idx) => {
            const expanded = expandedEx===ex.id;
            const bestSet = ex.sets.reduce((b,s) => (s.weight*s.reps > (b?.weight||0)*(b?.reps||0) ? s : b), ex.sets[0]);
            const e1rm = bestSet ? calc1RM(bestSet.weight, bestSet.reps, settings.formula) : 0;
            return (
              <div key={ex.id} style={{...S.cardBox,overflow:"hidden",animation:`scaleIn 0.3s ease-out`}}>
                <button onClick={()=>setExpandedEx(expanded?null:ex.id)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:16,background:"transparent",border:"none",cursor:"pointer",color:S.text,textAlign:"left"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:32,height:32,borderRadius:8,background:"rgba(0,212,255,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:S.fontMono,fontSize:12,color:S.accent,fontWeight:700}}>{idx+1}</div>
                    <div>
                      <div style={{fontFamily:S.fontHeading,fontWeight:600,fontSize:13}}>{exName(ex.exerciseId)}</div>
                      <div style={{fontSize:11,color:S.muted}}>{ex.sets.length} sets · e1RM: {e1rm>0?`${e1rm} ${settings.unit}`:"—"}</div>
                    </div>
                  </div>
                  {expanded ? Icons.chevUp({size:18,color:S.muted}) : Icons.chevDown({size:18,color:S.muted})}
                </button>
                {expanded && (
                  <div style={{padding:"0 16px 16px"}}>
                    {/* Headers */}
                    <div style={{display:"grid",gridTemplateColumns:"2rem 1fr 1fr 2.5rem 2rem",gap:8,marginBottom:8,paddingLeft:4}}>
                      {["SET",settings.unit.toUpperCase(),"REPS","RPE",""].map((h,i)=><span key={i} style={{fontSize:9,color:S.muted,fontFamily:S.fontHeading}}>{h}</span>)}
                    </div>
                    {/* Sets */}
                    {ex.sets.map((s,si) => (
                      <div key={s.id} style={{display:"grid",gridTemplateColumns:"2rem 1fr 1fr 2.5rem 2rem",gap:8,marginBottom:8,alignItems:"center"}}>
                        <span style={{textAlign:"center",fontSize:12,fontFamily:S.fontMono,color:S.muted}}>{si+1}</span>
                        <input type="number" inputMode="decimal" style={{...S.input,textAlign:"center",padding:"8px 6px",fontSize:13,fontFamily:S.fontMono}} value={s.weight||""} placeholder="0" onChange={e=>updateSet(ex.id,s.id,"weight",Number(e.target.value))}/>
                        <input type="number" inputMode="numeric" style={{...S.input,textAlign:"center",padding:"8px 6px",fontSize:13,fontFamily:S.fontMono}} value={s.reps||""} placeholder="0" onChange={e=>updateSet(ex.id,s.id,"reps",Number(e.target.value))}/>
                        <input type="number" inputMode="decimal" style={{...S.input,textAlign:"center",padding:"8px 4px",fontSize:10,fontFamily:S.fontMono}} value={s.rpe||""} placeholder="—" onChange={e=>updateSet(ex.id,s.id,"rpe",Number(e.target.value))}/>
                        <button onClick={()=>removeSet(ex.id,s.id)} style={{background:"none",border:"none",cursor:"pointer",padding:2}}>{Icons.trash({size:14,color:S.muted})}</button>
                      </div>
                    ))}
                    <div style={{display:"flex",gap:8,marginTop:12}}>
                      <button onClick={()=>addSet(ex.id)} style={{...S.btn,flex:1,background:"transparent",color:S.muted,border:`1px solid ${S.border}`,fontSize:11}}>{Icons.plus({size:14})} Add Set</button>
                      <button onClick={()=>startTimer(settings.restTime)} style={{...S.btn,background:"transparent",color:S.muted,border:`1px solid ${S.border}`,fontSize:11,padding:"8px 12px"}}>{Icons.timer({size:14})} Rest</button>
                      <button onClick={()=>removeEx(ex.id)} style={{...S.btn,background:"transparent",color:S.red,border:`1px solid ${S.border}33`,fontSize:11,padding:"8px 12px"}}>{Icons.trash({size:14})}</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* Add Exercise */}
        <button onClick={()=>setShowPicker(true)} style={{width:"100%",padding:14,borderRadius:12,border:`2px dashed ${S.border}`,background:"transparent",color:S.muted,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,fontFamily:S.fontHeading,fontSize:13,letterSpacing:"0.1em",transition:"all 0.2s"}}>
          {Icons.plus({size:18})} ADD EXERCISE
        </button>

        {/* Finish */}
        {aw.exercises.length>0 && (
          <button onClick={finishWorkout} style={{...S.btn,width:"100%",marginTop:16,padding:16,fontSize:16,background:S.neon,color:S.bg,boxShadow:"0 0 8px rgba(57,255,20,0.4),0 0 24px rgba(57,255,20,0.15)"}}>
            {Icons.check({size:22,color:S.bg})} FINISH WORKOUT
          </button>
        )}

        {/* Exercise Picker */}
        <ExercisePicker open={showPicker} onClose={()=>setShowPicker(false)} onSelect={addExercise}/>

        {/* Finish Modal */}
        <Modal open={showFinish} onClose={()=>{setShowFinish(false);setPage("home")}} title="Workout Complete!">
          {finResult && (
            <div style={{padding:24,textAlign:"center"}}>
              <div style={{width:80,height:80,borderRadius:"50%",background:"rgba(57,255,20,0.15)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>
                {Icons.trophy({size:36,color:S.neon})}
              </div>
              <h3 style={{fontFamily:S.fontDisplay,fontSize:32,marginBottom:4}}>{finResult.name}</h3>
              <p style={{fontSize:13,color:S.muted,marginBottom:24}}>{finResult.duration}min · {finResult.exercises.length} exercises</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:24}}>
                <div style={{background:S.card,borderRadius:12,padding:16}}>
                  <div style={{fontFamily:S.fontDisplay,fontSize:28,color:S.accent}}>{fmtVol(finResult.totalVolume)}</div>
                  <div style={{fontSize:10,color:S.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginTop:4}}>Total Volume</div>
                </div>
                <div style={{background:S.card,borderRadius:12,padding:16}}>
                  <div style={{fontFamily:S.fontDisplay,fontSize:28,color:S.gold}}>{finResult.prsHit}</div>
                  <div style={{fontSize:10,color:S.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginTop:4}}>PRs Hit</div>
                </div>
              </div>
              <div style={{display:"flex",gap:12}}>
                <button onClick={()=>{setShowFinish(false);setPage("influencer")}} style={{...S.btn,flex:1,background:S.accent,color:S.bg}}>{Icons.zap({size:16,color:S.bg})} Share to IG</button>
                <button onClick={()=>{setShowFinish(false);setPage("home")}} style={{...S.btn,flex:1,background:"transparent",color:S.muted,border:`1px solid ${S.border}`}}>Done</button>
              </div>
            </div>
          )}
        </Modal>
      </div>
    );
  }

  // --- EXERCISE PICKER ---
  function ExercisePicker({open,onClose,onSelect}) {
    const [search, setSearch] = useState("");
    const [filterCat, setFilterCat] = useState("");
    const filtered = useMemo(() => exercises.filter(e => {
      if (search && !e.name.toLowerCase().includes(search.toLowerCase())) return false;
      if (filterCat && e.cat !== filterCat) return false;
      return true;
    }), [search, filterCat]);
    const cats = ["barbell","dumbbell","machine","cable","bodyweight","olympic"];
    return (
      <Modal open={open} onClose={onClose} title="Add Exercise">
        <div style={{padding:16}}>
          <div style={{position:"relative",marginBottom:12}}>
            <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)"}}>{Icons.search({size:16,color:S.muted})}</div>
            <input style={{...S.input,paddingLeft:36}} placeholder="Search exercises..." value={search} onChange={e=>setSearch(e.target.value)} autoFocus/>
          </div>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:12}}>
            <button onClick={()=>setFilterCat("")} style={{...S.btn,padding:"4px 12px",fontSize:11,flexShrink:0,background:!filterCat?S.accent:"#1a1a28",color:!filterCat?S.bg:S.muted,border:"none"}}>ALL</button>
            {cats.map(c=>(
              <button key={c} onClick={()=>setFilterCat(filterCat===c?"":c)} style={{...S.btn,padding:"4px 12px",fontSize:11,flexShrink:0,textTransform:"capitalize",background:filterCat===c?S.accent:"#1a1a28",color:filterCat===c?S.bg:S.muted,border:"none"}}>{c}</button>
            ))}
          </div>
          <div style={{maxHeight:"50vh",overflowY:"auto"}}>
            {filtered.map(e=>(
              <button key={e.id} onClick={()=>{onSelect(e.id);setSearch("");setFilterCat("")}} style={{width:"100%",textAlign:"left",padding:"12px",borderRadius:12,background:"transparent",border:"none",cursor:"pointer",color:S.text,display:"flex",alignItems:"center",justifyContent:"space-between",transition:"background 0.15s"}}
                onMouseEnter={ev=>ev.currentTarget.style.background=S.card} onMouseLeave={ev=>ev.currentTarget.style.background="transparent"}>
                <div>
                  <div style={{fontFamily:S.fontHeading,fontSize:13}}>{e.name}</div>
                  <div style={{fontSize:11,color:S.muted,textTransform:"capitalize"}}>{e.cat} · {e.mg}</div>
                </div>
                {Icons.plus({size:16,color:S.accent})}
              </button>
            ))}
            {filtered.length===0 && <p style={{textAlign:"center",color:S.muted,padding:24,fontSize:13}}>No exercises found</p>}
          </div>
        </div>
      </Modal>
    );
  }

  // --- PROGRESS ---
  function ProgressPage() {
    const [tab, setTab] = useState("volume");
    const tabs = [{key:"volume",label:"VOLUME"},{key:"1rm",label:"1RM"},{key:"prs",label:"PRs"},{key:"body",label:"BODY"}];
    
    const volData = useMemo(()=>[...workouts].sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(-15).map(w=>w.totalVolume),[workouts]);
    const e1rmData = useMemo(()=>{
      const lifts = ["bb-squat","bb-bench","bb-deadlift","bb-ohp"];
      const result = {};
      lifts.forEach(l=>{result[l]=[]});
      [...workouts].sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(w=>{
        w.exercises.forEach(ex=>{
          if(lifts.includes(ex.exerciseId)){
            const best = ex.sets.reduce((m,s)=>{const e=calc1RM(s.weight,s.reps,settings.formula);return e>m?e:m;},0);
            if(best>0)result[ex.exerciseId].push(best);
          }
        });
      });
      return result;
    },[workouts,settings.formula]);

    const sortedPRs = useMemo(()=>[...prs].sort((a,b)=>b.e1rm-a.e1rm),[prs]);
    const sortedMeasure = useMemo(()=>[...measurements].sort((a,b)=>new Date(a.date)-new Date(b.date)),[measurements]);
    const weightData = sortedMeasure.filter(m=>m.weight).map(m=>m.weight);

    return (
      <div style={{padding:"16px 16px 96px"}}>
        <h1 style={{fontFamily:S.fontDisplay,fontSize:32,marginBottom:16}}><span style={{color:S.accent}}>PROGRESS</span></h1>
        <div style={{display:"flex",gap:4,background:S.surface,borderRadius:12,padding:4,marginBottom:24}}>
          {tabs.map(t=>(
            <button key={t.key} onClick={()=>setTab(t.key)} style={{...S.btn,flex:1,padding:"8px 4px",fontSize:11,background:tab===t.key?S.accent:"transparent",color:tab===t.key?S.bg:S.muted,border:"none"}}>{t.label}</button>
          ))}
        </div>

        {tab==="volume" && (
          <div>
            <h2 style={{fontFamily:S.fontHeading,fontSize:16,fontWeight:600,display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              {Icons.trending({size:18,color:S.accent})} Volume Over Time
            </h2>
            <div style={{...S.cardBox,padding:16,marginBottom:16}}>
              {volData.length>1 ? <MiniChart data={volData} color={S.accent}/> : <p style={{textAlign:"center",color:S.muted,padding:20,fontSize:13}}>Need more workouts for charts</p>}
            </div>
            <h3 style={{fontFamily:S.fontHeading,fontSize:14,fontWeight:600,marginBottom:8}}>Last 5 Workouts</h3>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {workouts.slice(0,5).map(w=>(
                <div key={w.id} style={{display:"flex",justifyContent:"space-between",background:S.card,borderRadius:10,padding:"10px 14px"}}>
                  <div><div style={{fontFamily:S.fontHeading,fontSize:13}}>{w.name}</div><div style={{fontSize:10,color:S.muted}}>{dAgo(w.date)}</div></div>
                  <div style={{fontFamily:S.fontMono,fontSize:13,color:S.accent}}>{fmtVol(w.totalVolume)}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab==="1rm" && (
          <div>
            <h2 style={{fontFamily:S.fontHeading,fontSize:16,fontWeight:600,display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              {Icons.activity({size:18,color:S.neon})} Estimated 1RM Progress
            </h2>
            {[{id:"bb-squat",color:S.accent},{id:"bb-bench",color:S.neon},{id:"bb-deadlift",color:S.red},{id:"bb-ohp",color:S.purple}].map(lift=>(
              <div key={lift.id} style={{...S.cardBox,padding:16,marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <div style={{width:10,height:10,borderRadius:"50%",background:lift.color}}/>
                  <span style={{fontFamily:S.fontHeading,fontSize:13,fontWeight:600}}>{exName(lift.id)}</span>
                  {e1rmData[lift.id]?.length>0 && <span style={{fontFamily:S.fontMono,fontSize:12,color:lift.color,marginLeft:"auto"}}>{e1rmData[lift.id][e1rmData[lift.id].length-1]} {settings.unit}</span>}
                </div>
                {e1rmData[lift.id]?.length>1 ? <MiniChart data={e1rmData[lift.id]} height={80} color={lift.color}/> : <p style={{fontSize:11,color:S.muted}}>Need more data points</p>}
              </div>
            ))}
          </div>
        )}

        {tab==="prs" && (
          <div>
            <h2 style={{fontFamily:S.fontHeading,fontSize:16,fontWeight:600,display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              {Icons.trophy({size:18,color:S.gold})} All Personal Records
            </h2>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {sortedPRs.map((pr,i)=>(
                <div key={`${pr.exerciseId}-${i}`} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:S.card,borderRadius:12,padding:"12px 16px",...S.cardBox}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:32,height:32,borderRadius:8,background:"rgba(255,215,0,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:S.fontMono,fontSize:11,color:S.gold,fontWeight:700}}>#{i+1}</div>
                    <div>
                      <div style={{fontFamily:S.fontHeading,fontSize:13,fontWeight:600}}>{exName(pr.exerciseId)}</div>
                      <div style={{fontSize:11,color:S.muted}}>{dAgo(pr.date)}</div>
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:S.fontMono,fontSize:13,color:S.neon}}>{fmtWt(pr.weight,settings.unit)} x{pr.reps}</div>
                    <div style={{fontSize:10,color:S.muted}}>e1RM: {fmtWt(pr.e1rm,settings.unit)}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab==="body" && (
          <div>
            <h2 style={{fontFamily:S.fontHeading,fontSize:16,fontWeight:600,display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              {Icons.scale({size:18,color:S.purple})} Body Measurements
            </h2>
            {weightData.length>1 && (
              <div style={{...S.cardBox,padding:16,marginBottom:16}}>
                <div style={{fontSize:10,color:S.muted,fontFamily:S.fontHeading,letterSpacing:"0.1em",marginBottom:8}}>BODYWEIGHT (LBS)</div>
                <MiniChart data={weightData} color={S.purple}/>
              </div>
            )}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {[...measurements].reverse().map(m=>(
                <div key={m.id} style={{background:S.card,borderRadius:12,padding:"10px 14px"}}>
                  <div style={{fontSize:11,color:S.muted,marginBottom:4}}>{fmtDate(m.date)}</div>
                  <div style={{display:"flex",gap:12,flexWrap:"wrap",fontSize:12}}>
                    {m.weight&&<span><span style={{color:S.muted}}>Weight:</span> <span style={{fontFamily:S.fontMono}}>{m.weight} lbs</span></span>}
                    {m.bf&&<span><span style={{color:S.muted}}>BF:</span> <span style={{fontFamily:S.fontMono}}>{m.bf}%</span></span>}

  function InfluencerPage() {
    const canvasRef = useRef(null);
    const [selPR, setSelPR] = useState(prs[0]?.exerciseId??"");
    const [caption, setCaption] = useState("");
    const [generated, setGenerated] = useState(false);
    const pr = prs.find(p=>p.exerciseId===selPR);

    const genCaption = () => {
      if(!pr) return;
      const n = exName(pr.exerciseId);
      const caps = [
        `🏆 NEW PR ALERT! ${n}: ${pr.weight} ${settings.unit} × ${pr.reps}. The grind pays off. 💪\n\nE1RM: ${pr.e1rm} ${settings.unit}\n\n#powerlifting #pr #gym #liftforge #strength`,
        `${pr.weight} ${settings.unit} on ${n}. New personal best. 🔥\n\nNo shortcuts. Just consistency.\n\n#newpr #lifting #gains #liftforge`,
        `Hit ${pr.weight} ${settings.unit} for ${pr.reps} on ${n} today. PR smashed. 💥\n\nEstimated 1RM: ${pr.e1rm} ${settings.unit}. Next stop: ${Math.ceil((pr.e1rm+10)/5)*5}.\n\n#prday #powerlifter #gymlife #liftforge`,
      ];
      setCaption(caps[Math.floor(Math.random()*caps.length)]);
    };

    const generate = () => {
      const c = canvasRef.current; if(!c||!pr) return;
      const ctx = c.getContext("2d"); c.width=1080; c.height=1080;
      // BG
      const g=ctx.createLinearGradient(0,0,1080,1080); g.addColorStop(0,"#0a0a0f"); g.addColorStop(0.5,"#12121a"); g.addColorStop(1,"#0a0a0f");
      ctx.fillStyle=g; ctx.fillRect(0,0,1080,1080);
      // Glows
      ctx.save(); ctx.globalAlpha=0.08;
      const r1=ctx.createRadialGradient(200,200,0,200,200,400); r1.addColorStop(0,"#00d4ff"); r1.addColorStop(1,"transparent"); ctx.fillStyle=r1; ctx.fillRect(0,0,600,600);
      const r2=ctx.createRadialGradient(880,880,0,880,880,400); r2.addColorStop(0,"#39ff14"); r2.addColorStop(1,"transparent"); ctx.fillStyle=r2; ctx.fillRect(480,480,600,600);
      ctx.restore();
      // Grid
      ctx.save(); ctx.globalAlpha=0.03; ctx.strokeStyle="#00d4ff"; ctx.lineWidth=1;
      for(let i=0;i<1080;i+=40){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,1080);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(1080,i);ctx.stroke();}
      ctx.restore();
      // Bars
      ctx.fillStyle="#00d4ff"; ctx.fillRect(0,0,1080,4);
      ctx.fillStyle="#39ff14"; ctx.fillRect(0,1076,1080,4);
      // Logo
      ctx.font="700 48px 'Bebas Neue',Impact,sans-serif"; ctx.fillStyle="#00d4ff"; ctx.textAlign="left"; ctx.fillText("LIFTFORGE",60,90);
      ctx.font="700 28px 'Oswald',sans-serif"; ctx.fillStyle="#39ff14"; ctx.textAlign="right"; ctx.fillText("🏆 NEW PR",1020,85);
      // Divider
      ctx.strokeStyle="rgba(0,212,255,0.2)"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(60,120); ctx.lineTo(1020,120); ctx.stroke();
      // Exercise
      ctx.font="700 72px 'Oswald',sans-serif"; ctx.fillStyle="#e8e8f0"; ctx.textAlign="center"; ctx.fillText(exName(pr.exerciseId).toUpperCase(),540,360);
      // Weight
      ctx.font="700 180px 'Bebas Neue',Impact,sans-serif"; ctx.fillStyle="#00d4ff"; ctx.fillText(`${pr.weight}`,540,560);
      // Unit
      ctx.font="600 48px 'Oswald',sans-serif"; ctx.fillStyle="#8888a0"; ctx.fillText(`${settings.unit.toUpperCase()} × ${pr.reps} REP${pr.reps>1?"S":""}`,540,630);
      // e1RM
      ctx.font="500 36px 'DM Sans',sans-serif"; ctx.fillStyle="#39ff14"; ctx.fillText(`EST. 1RM: ${pr.e1rm} ${settings.unit.toUpperCase()}`,540,710);
      // Bottom
      ctx.strokeStyle="rgba(0,212,255,0.2)"; ctx.beginPath(); ctx.moveTo(60,900); ctx.lineTo(1020,900); ctx.stroke();
      ctx.font="400 28px 'DM Sans',sans-serif"; ctx.fillStyle="#8888a0"; ctx.textAlign="left"; ctx.fillText(fmtDate(pr.date),60,960);
      ctx.textAlign="right"; ctx.fillStyle="#00d4ff"; ctx.fillText(settings.username,1020,960);
      ctx.font="400 20px 'DM Sans',sans-serif"; ctx.fillStyle="#555570"; ctx.textAlign="center"; ctx.fillText("TRACK HEAVY. COMPARE GYMS. BUILD YOUR LEGACY.",540,1040);
      setGenerated(true); genCaption();
    };

    const download = () => {
      const c=canvasRef.current; if(!c) return;
      const l=document.createElement("a"); l.download=`liftforge-pr-${pr?.exerciseId}.png`; l.href=c.toDataURL("image/png"); l.click();
    };

    const monthW = workouts.filter(w=>{const d=new Date(w.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
    const monthVol = monthW.reduce((s,w)=>s+w.totalVolume,0);
    const monthPRs = monthW.reduce((s,w)=>s+w.prsHit,0);

    return (
      <div style={{padding:"16px 16px 96px"}}>
        <h1 style={{fontFamily:S.fontDisplay,fontSize:32,marginBottom:4}}><span style={{color:S.accent}}>CREATOR</span> STUDIO</h1>
        <p style={{fontSize:11,color:S.muted,marginBottom:24}}>Generate influencer-ready content from your lift data</p>

        <div style={{...S.cardBox,padding:16,marginBottom:24}}>
          <h2 style={{fontFamily:S.fontHeading,fontSize:16,fontWeight:600,display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
            {Icons.trophy({size:16,color:S.gold})} PR Progress Post
          </h2>
          <div style={{marginBottom:16}}>
            <label style={{fontSize:10,color:S.muted,fontFamily:S.fontHeading,letterSpacing:"0.1em",display:"block",marginBottom:4}}>SELECT PR</label>
            <select style={{...S.input,appearance:"auto"}} value={selPR} onChange={e=>{setSelPR(e.target.value);setGenerated(false);}}>
              {prs.map(p=><option key={p.exerciseId} value={p.exerciseId}>{exName(p.exerciseId)} — {p.weight} {settings.unit} × {p.reps}</option>)}
            </select>
          </div>
          <button onClick={generate} style={{...S.btn,width:"100%",padding:14,fontSize:14,background:S.accent,color:S.bg,marginBottom:16}}>
            {Icons.zap({size:18,color:S.bg})} GENERATE POST
          </button>
          <div style={{background:S.bg,borderRadius:12,overflow:"hidden",marginBottom:16}}>
            <canvas ref={canvasRef} style={{width:"100%",aspectRatio:"1/1",display:generated?"block":"none"}}/>
            {!generated && (
              <div style={{aspectRatio:"1/1",display:"flex",alignItems:"center",justifyContent:"center",color:S.muted}}>
                <div style={{textAlign:"center"}}>{Icons.image({size:48,color:`${S.muted}40`})}<p style={{fontSize:12,marginTop:8}}>Click generate to preview</p></div>
              </div>
            )}
          </div>
          {generated && (
            <div style={{display:"flex",gap:8}}>
              <button onClick={download} style={{...S.btn,flex:1,background:"transparent",color:S.muted,border:`1px solid ${S.border}`,fontSize:12}}>{Icons.download({size:14})} Save</button>
              <button onClick={()=>{const c=canvasRef.current;if(c&&navigator.share)c.toBlob(b=>{if(b)navigator.share({files:[new File([b],"liftforge-pr.png",{type:"image/png"})],text:caption}).catch(()=>{})});else download();}} style={{...S.btn,flex:1,background:S.accent,color:S.bg,fontSize:12}}>{Icons.share({size:14,color:S.bg})} Share</button>
            </div>
          )}
        </div>

        {caption && (
          <div style={{...S.cardBox,padding:16,marginBottom:24,animation:"slideUp 0.3s ease-out"}}>
            <h2 style={{fontFamily:S.fontHeading,fontSize:16,fontWeight:600,display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              {Icons.sparkles({size:16,color:S.purple})} Caption
            </h2>
            <div style={{background:S.surface,borderRadius:12,padding:12,fontSize:13,whiteSpace:"pre-wrap",lineHeight:1.6,marginBottom:12}}>{caption}</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>navigator.clipboard?.writeText(caption)} style={{...S.btn,flex:1,background:"transparent",color:S.muted,border:`1px solid ${S.border}`,fontSize:11}}>{Icons.copy({size:14})} Copy</button>
              <button onClick={genCaption} style={{...S.btn,flex:1,background:"transparent",color:S.muted,border:`1px solid ${S.border}`,fontSize:11}}>{Icons.sparkles({size:14})} Regenerate</button>
            </div>
          </div>
        )}

        <div style={{...S.cardBox,padding:16}}>
          <h2 style={{fontFamily:S.fontHeading,fontSize:16,fontWeight:600,display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
            {Icons.zap({size:16,color:S.accent})} Monthly Highlight
          </h2>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,textAlign:"center",marginBottom:12}}>
            <div style={{background:S.surface,borderRadius:12,padding:12}}>
              <div style={{fontFamily:S.fontDisplay,fontSize:28,color:S.accent}}>{monthW.length}</div>
              <div style={{fontSize:9,color:S.muted}}>WORKOUTS</div>
            </div>
            <div style={{background:S.surface,borderRadius:12,padding:12}}>
              <div style={{fontFamily:S.fontDisplay,fontSize:28,color:S.neon}}>{monthPRs}</div>
              <div style={{fontSize:9,color:S.muted}}>PRs HIT</div>
            </div>
            <div style={{background:S.surface,borderRadius:12,padding:12}}>
              <div style={{fontFamily:S.fontDisplay,fontSize:28,color:S.gold}}>{fmtVol(monthVol)}</div>
              <div style={{fontSize:9,color:S.muted}}>VOLUME</div>
            </div>
          </div>
          <p style={{fontSize:11,color:S.muted,textAlign:"center"}}>Keep grinding — your month isn't over yet! 🔥</p>
        </div>
      </div>
    );
  }

  // ============ RENDER ============
  const navItems = [
    {key:"home",icon:Icons.home,label:"Home"},
    {key:"workout",icon:Icons.dumbbell,label:"Log"},
    {key:"progress",icon:Icons.barChart,label:"Progress"},
    {key:"gyms",icon:Icons.mapPin,label:"Gyms"},
    {key:"influencer",icon:Icons.share,label:"Create"},
  ];

  return (
    <div style={{minHeight:"100dvh",background:S.bg,color:S.text,fontFamily:S.fontBody,WebkitFontSmoothing:"antialiased",position:"relative"}}>
      <style>{css}</style>

      {/* Rest Timer Bar */}
      {timer.active && (
        <div style={{position:"fixed",top:0,left:0,right:0,zIndex:70,background:"rgba(18,18,26,0.95)",backdropFilter:"blur(12px)",borderBottom:`1px solid ${S.accent}40`,animation:"slideUp 0.3s ease-out",zIndex:70}}>
          <div style={{maxWidth:480,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 16px"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <span style={{color:S.accent,animation:"pulseNeon 2s infinite"}}>{Icons.timer({size:18,color:S.accent})}</span>
              <span style={{fontFamily:S.fontMono,fontSize:18,color:S.accent,fontWeight:600}}>{fmtTime(timer.remaining)}</span>
              <span style={{fontSize:11,color:S.muted}}>REST</span>
            </div>
            <button onClick={()=>setTimer({active:false,remaining:0,total:0})} style={{background:"none",border:"none",cursor:"pointer",padding:4}}>{Icons.x({size:16,color:S.muted})}</button>
          </div>
          <div style={{height:2,background:S.border}}>
            <div style={{height:"100%",background:S.accent,transition:"width 1s linear",width:`${((timer.total-timer.remaining)/timer.total)*100}%`}}/>
          </div>
        </div>
      )}

      {/* Page Content */}
      <div style={{maxWidth:480,margin:"0 auto"}}>
        {page==="home" && <HomePage/>}
        {page==="workout" && <WorkoutPage/>}
        {page==="progress" && <ProgressPage/>}
        {page==="gyms" && <GymsPage/>}
        {page==="influencer" && <InfluencerPage/>}
      </div>

      {/* Bottom Nav */}
      <nav style={{position:"fixed",bottom:0,left:0,right:0,zIndex:60,background:"rgba(18,18,26,0.95)",backdropFilter:"blur(12px)",borderTop:`1px solid ${S.border}`}}>
        <div style={{maxWidth:480,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-around",padding:"8px 8px 12px"}}>
          {navItems.map(n=>(
            <button key={n.key} onClick={()=>setPage(n.key)}
              style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 12px",borderRadius:8,background:"transparent",border:"none",cursor:"pointer",color:page===n.key?S.accent:S.muted,transition:"color 0.2s"}}>
              {n.icon({size:22,color:page===n.key?S.accent:S.muted,strokeWidth:page===n.key?2.5:1.8})}
              <span style={{fontSize:10,fontFamily:S.fontHeading,letterSpacing:"0.1em"}}>{n.label}</span>
              {page===n.key && <div style={{width:4,height:4,borderRadius:"50%",background:S.accent,marginTop:-2}}/>}
            </button>
          ))}
        </div>
      </nav>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(LiftForge));
</script>
</body>
</html>
